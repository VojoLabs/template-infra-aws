name: Create Repo from Template
on:
  issues:
    types: [opened]

jobs:
  create-repository:
    # Verifica se o título da issue começa com o prefixo do seu formulário
    if: startsWith(github.event.issue.title, '[Novo Projeto]')
    runs-on: ubuntu-latest
    steps:
      - name: Create Repo
        env:
          GH_TOKEN: ${{ secrets.GHA_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 1. Extrair o nome do repo do formulário (mesma lógica anterior)
          REPO_NAME=$(echo "$ISSUE_BODY" | grep -A 1 "Qual o nome do novo repositório?" | tail -n 1 | xargs)
          
          # 2. Definir o destino (mesma organização do template)
          DESTINATION="${{ github.repository_owner }}/$REPO_NAME"
          
          # 3. Criar o repositório a partir do template
          gh repo create "$DESTINATION" \
            --template "${{ github.repository }}" \
            --public \
            --clone
          
          # 4. Entrar na pasta, criar a branch develop e dar push
          cd "$REPO_NAME"
          git checkout -b develop
          git push origin develop
          
      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # REPO_NAME é a variável que extraímos do formulário no step anterior
        run: |
          REPO_URL="https://github.com/${{ github.repository_owner }}/$REPO_NAME"
          
          gh issue close ${{ github.event.issue.number }} \
            --comment "✅ **Repositório criado com sucesso!**
            
            O seu novo projeto já está disponível em:
            🔗 $REPO_URL
            
            **Estrutura configurada:**
            - Branch: \`main\` (padrão)
            - Branch: \`develop\`
            - Origem: \`Organization: ${{ github.repository_owner }}\`"