name: Create Repo from Template
on:
  issues:
    types: [opened]

jobs:
  create-repository:
    if: startsWith(github.event.issue.title, '[Novo Projeto]')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Template
        uses: actions/checkout@v4

      - name: Add Start Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "⏳ **Iniciando a configuração...** O repositório está sendo provisionado na organização **VojoLabs**."

      - name: Create and Configure Repo
        id: create_step
        env:
          GH_TOKEN: ${{ secrets.GHA_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # 1. Extração Robusta (awk é melhor que grep para formulários YAML do GitHub)
          # Ele busca o que está após a pergunta e limpa espaços extras
          REPO_NAME=$(echo "$ISSUE_BODY" | awk -F'Qual o nome do novo repositório\\?' '{print $2}' | xargs | awk '{print $1}')
          
          # 2. Exportação Imediata (para garantir que o nome apareça mesmo se o passo falhar depois)
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV

          # 3. Validação de segurança
          if [ -z "$REPO_NAME" ] || [ "$REPO_NAME" == "_Noresponse_" ]; then
            echo "ERRO: Nome do repositório não encontrado." && exit 1
          fi

          # 4. Criação do Repo
          gh repo create "VojoLabs/$REPO_NAME" \
            --template "VojoLabs/template-infra-aws" \
            --public \
            --clone

          # 5. Configuração de Branches
          if [ -d "$REPO_NAME" ]; then
            cd "$REPO_NAME"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            git checkout main || git checkout -b main
            git checkout -b develop
            git push origin develop
          else
            echo "ERRO: O repositório não foi clonado corretamente." && exit 1
          fi

      - name: Success Comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --comment "✅ **Repositório criado com sucesso!**
            
            🔗 [Acessar novo repositório](https://github.com/VojoLabs/${{ env.REPO_NAME }})
            
            **Detalhes:**
            - Organização: \`VojoLabs\`
            - Branches: \`main\`, \`develop\`"

      - name: Error Comment
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Se REPO_NAME estiver vazio, usamos um fallback para o log não ficar feio
          DISPLAY_NAME="${{ env.REPO_NAME }}"
          if [ -z "$DISPLAY_NAME" ]; then DISPLAY_NAME="indefinido"; fi

          gh issue comment ${{ github.event.issue.number }} \
            --body "❌ **Erro na configuração:** Não foi possível criar o repositório \`$DISPLAY_NAME\`.
            
            **Verificações sugeridas:**
            1. O nome já existe na organização **VojoLabs**?
            2. O seu Personal Access Token (**GHA_TOKEN**) ainda é válido?
            3. O nome digitado possui caracteres proibidos (espaços, acentos)?"